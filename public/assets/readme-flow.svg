  <rect x="870" y="130" width="330" height="210" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="910" y="185" fill="#0f172a" font-size="30" font-family="Inter, Arial, sans-serif">3. Deploy</text>
  <text x="910" y="235" fill="#334155" font-size="22" font-family="Inter, Arial, sans-serif">Build + env vars</text>
  <text x="910" y="270" fill="#334155" font-size="22" font-family="Inter, Arial, sans-serif">Push to production</text>
  <path d="M418 235H460" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <path d="M813 235H855" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
